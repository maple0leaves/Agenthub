server:
  port: 8002
spring:
  application:
    name: agenthub
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/agenthub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: "001020"
  redis:
    host: localhost
    port: 6379
    password: "001020"
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring:
          json:
            add:
              type:
                headers: false
    consumer:
      group-id: agenthub-group
      auto-offset-reset: latest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "com.agenthub.dto,java.util"
            use:
              type:
                headers: false
mybatis-plus:
  type-aliases-package: com.agenthub.entity # 别名扫描包
logging:
  level:
    com.agenthub: debug
ai:
  service-url: http://127.0.0.1:8000
deepseek:
  api-key: 
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
